name: Desktop Manual Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-macos:
    name: Package macOS desktop
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Package macOS app
        run: corepack pnpm make:desktop

      - name: Publish macOS DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          dmg_path="apps/desktop/out/make/HarDay.dmg"
          release_tag="desktop-macos-${GITHUB_RUN_NUMBER}"

          test -f "$dmg_path"
          gh release create "$release_tag" "$dmg_path#HarDay.dmg" \
            --title "HarDay macOS desktop ${GITHUB_RUN_NUMBER}" \
            --notes "Manual macOS desktop build from ${GITHUB_SHA}." \
            --prerelease

  package-windows:
    name: Package Windows desktop
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm
        run: npm install --global pnpm@10.7.0

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Package Windows app
        run: corepack pnpm make:desktop:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harday-windows
          path: apps/desktop/out/make/**
          if-no-files-found: error
